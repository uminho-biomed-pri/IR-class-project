<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepositóriUM - Motor de Pesquisa</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="home-body">

    <main class="search-container-home">
        <div class="logo-section">
            <h1>Repositóri<span>UM</span></h1>
            <p>Pesquisa e Recuperação de Informação</p>
        </div>

        <form onsubmit="goToResults(event)" class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="query" placeholder="Pesquisar teses, artigos e autores..." required>
            
            <select id="algorithm" class="algo-select-home">
                <option value="tfidf_custom">TF-IDF</option>
                <option value="sklearn">Sklearn</option>
                <option value="boolean">Booleano</option>
            </select>

            <button type="submit">Pesquisar</button>
        </form>

        <div class="quick-links">
            <span>Sugestões:</span>
            <a href="#">Inteligência Artificial</a>
            <a href="#">Web Scraping</a>
        </div>
    </main>

    <script>
        function goToResults(event) {
            event.preventDefault();
            const query = document.getElementById("query").value;
            const method = document.getElementById("algorithm").value;
            // Redireciona mantendo os parâmetros para a próxima página
            window.location.href = `results?query=${encodeURIComponent(query)}&method=${method}`;
        }
    </script>
</body>
</html>
